name: Build Linux Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without v prefix)"
        required: false

permissions:
  contents: write

jobs:
  packages:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Zig
        run: |
          ZIG_VERSION=0.15.2
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 30 --max-time 300 \
            "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            binutils \
            build-essential \
            desktop-file-utils \
            gettext \
            libadwaita-1-dev \
            libepoxy-dev \
            libgtk-4-dev \
            libxml2-utils \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            python3-gi \
            pkg-config

      - name: Install current blueprint-compiler
        run: |
          BLUEPRINT_VERSION=v0.20.4
          git clone --depth 1 --branch "${BLUEPRINT_VERSION}" https://github.com/GNOME/blueprint-compiler.git /tmp/blueprint-compiler
          meson setup /tmp/blueprint-compiler/_build /tmp/blueprint-compiler --prefix /tmp/blueprint-prefix
          meson install -C /tmp/blueprint-compiler/_build
          echo "/tmp/blueprint-prefix/bin" >> "$GITHUB_PATH"

      - name: Install appimagetool
        run: |
          curl -L \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Build Linux packages
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          LIMUX_MAX_GLIBC: "2.39"
        run: ./scripts/package.sh "${{ steps.version.outputs.version }}"

      - name: Upload packages to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: limux-linux-packages-${{ steps.version.outputs.version }}
          path: dist/*
          retention-days: 30
