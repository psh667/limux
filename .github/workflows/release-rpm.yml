name: Build RPM Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without v prefix)"
        required: false

permissions:
  contents: write

jobs:
  rpm:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            binutils \
            build-essential \
            desktop-file-utils \
            gettext \
            libadwaita-1-dev \
            libepoxy-dev \
            libgtk-4-dev \
            libxml2-utils \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            pkg-config \
            python3-gi \
            rpm

      - name: Install current blueprint-compiler
        run: |
          BLUEPRINT_VERSION=v0.20.4
          git clone --depth 1 --branch "${BLUEPRINT_VERSION}" https://github.com/GNOME/blueprint-compiler.git /tmp/blueprint-compiler
          meson setup /tmp/blueprint-compiler/_build /tmp/blueprint-compiler --prefix /tmp/blueprint-prefix
          meson install -C /tmp/blueprint-compiler/_build
          echo "/tmp/blueprint-prefix/bin" >> "$GITHUB_PATH"

      - name: Build RPM package
        env:
          LIMUX_MAX_GLIBC: "2.39"
        run: ./scripts/package.sh "${{ steps.version.outputs.version }}"

      - name: Resolve RPM path
        id: rpm
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="$(uname -m)"
          RPM_ARCH="x86_64"
          [ "$ARCH" = "aarch64" ] && RPM_ARCH="aarch64"
          RPM_OUTPUT="dist/limux-${VERSION}-1.${RPM_ARCH}.rpm"
          test -f "$RPM_OUTPUT"
          echo "rpm_path=$RPM_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "rpm_arch=$RPM_ARCH" >> "$GITHUB_OUTPUT"

      - name: Upload RPM to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.rpm.outputs.rpm_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload RPM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: limux-rpm-${{ steps.version.outputs.version }}
          path: ${{ steps.rpm.outputs.rpm_path }}
          retention-days: 30
